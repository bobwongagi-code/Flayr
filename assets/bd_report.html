<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flayr · 提升报告</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#11151A;
    --ink-soft:#5B6472;
    --ink-faint:#8A93A0;
    --paper:#F1F4F6;
    --surface:#FFFFFF;
    --line:#DDE3E8;
    --teal:#0EA9A0;
    --teal-soft:#E1F5F3;
    --teal-ink:#075D57;
    --coral:#E8623F;
    --coral-soft:#FCEAE4;
    --coral-ink:#8A3A24;
    --amber:#DB9A2E;
    --amber-soft:#FBF1DD;
    --amber-ink:#7A5510;
    --red:#D64545;
    --red-soft:#FBE7E7;
    --red-ink:#822424;
    --gray-chip:#9AA3AC;
    --gray-chip-soft:#EDEFF1;
    --gray-chip-ink:#565E68;
    --radius:10px;
    --radius-lg:18px;
    --font-display:'Space Grotesk','PingFang SC','Microsoft YaHei',sans-serif;
    --font-body:'Inter','PingFang SC','Microsoft YaHei',sans-serif;
    --font-mono:'IBM Plex Mono','SF Mono',monospace;
    --shadow-card:0 1px 2px rgba(17,21,26,0.04), 0 8px 24px -12px rgba(17,21,26,0.12);
  }

  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);color:var(--ink);font-family:var(--font-body);font-size:15px;line-height:1.6;
    -webkit-font-smoothing:antialiased;
  }
  h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0;color:var(--ink);}
  p{margin:0;}
  .app{max-width:1080px;margin:0 auto;padding:0 24px 80px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;padding:22px 0 18px;gap:14px;}
  .wordmark{display:flex;align-items:baseline;gap:10px;}
  .wordmark .mark{font-family:var(--font-display);font-weight:700;font-size:22px;letter-spacing:-0.02em;}
  .wordmark .tag{font-size:12px;color:var(--ink-faint);font-family:var(--font-mono);}
  .report-top{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:18px;flex-wrap:wrap;}
  .report-title-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .badge{font-size:11.5px;font-family:var(--font-mono);padding:4px 10px;border-radius:999px;}
  .badge-level-strategy{background:var(--ink);color:#fff;}
  .badge-level-basic{background:var(--gray-chip-soft);color:var(--gray-chip-ink);}
  .report-meta{font-size:13px;color:var(--ink-soft);margin-top:6px;}
  .degraded-inline{font-size:12.5px;color:var(--amber-ink);margin-top:8px;display:flex;align-items:center;gap:6px;}
  .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-lg);box-shadow:var(--shadow-card);}
  .summary-card{padding:20px 22px;margin-bottom:16px;}
  .summary-card p{color:var(--ink-soft);font-size:14px;}
  .summary-card .verdict{color:var(--ink);font-size:15px;font-weight:500;margin-bottom:8px;}
  .gate-row{display:flex;gap:10px;flex-wrap:wrap;margin-top:14px;}
  .gate-chip{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;background:var(--red-soft);font-size:12.5px;color:var(--red-ink);}
  .gate-chip .p-tag{font-family:var(--font-mono);font-weight:600;background:var(--red);color:#fff;padding:1px 6px;border-radius:5px;font-size:11px;}
  .gate-chip.p2{background:var(--amber-soft);color:var(--amber-ink);}
  .gate-chip.p2 .p-tag{background:var(--amber);}
  .stage-tabs{display:flex;gap:6px;margin:20px 0 4px;overflow-x:auto;padding-bottom:2px;}
  .stage-tab{font-family:var(--font-mono);font-size:13px;padding:8px 14px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-soft);white-space:nowrap;flex-shrink:0;}
  .stage-tab .sev-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px;}
  .stage-tab.active{background:var(--ink);color:#fff;border-color:var(--ink);}
  .stage-tab.active .sev-dot{filter:brightness(1.4);}
  .stage-panel{display:none;margin-top:14px;}
  .stage-panel.active{display:block;}
  .stage-panel-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;flex-wrap:wrap;gap:10px;}
  .stage-panel-head h3{font-size:16px;}
  .sev-chip{font-size:12px;padding:4px 11px;border-radius:999px;font-weight:500;}
  .sev-small{background:var(--gray-chip-soft);color:var(--gray-chip-ink);}
  .sev-medium{background:var(--amber-soft);color:var(--amber-ink);}
  .sev-large{background:var(--red-soft);color:var(--red-ink);}
  .compare-grid{display:grid;grid-template-columns:1fr 180px 1fr;gap:14px;align-items:stretch;}
  .compare-col{border-radius:14px;padding:16px;background:var(--surface);border:1px solid var(--line);}
  .compare-col.creator{border-top:3px solid var(--coral);}
  .compare-col.benchmark{border-top:3px solid var(--teal);}
  .compare-col .who{font-size:11.5px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;}
  .compare-col.creator .who{color:var(--coral-ink);}
  .compare-col.benchmark .who{color:var(--teal-ink);}
  .frame-thumb{width:100%;height:92px;border-radius:9px;margin-bottom:10px;position:relative;overflow:hidden;display:flex;align-items:flex-end;}
  .compare-col.creator .frame-thumb{background:linear-gradient(135deg,var(--coral-soft),#fff);}
  .compare-col.benchmark .frame-thumb{background:linear-gradient(135deg,var(--teal-soft),#fff);}
  .frame-thumb .ts{font-family:var(--font-mono);font-size:11px;background:rgba(17,21,26,0.72);color:#fff;padding:2px 7px;border-radius:6px;margin:8px;}
  .compare-col .evidence-text{font-size:13px;color:var(--ink-soft);}
  .gap-col{display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;gap:8px;padding:14px 10px;border-radius:14px;background:var(--paper);border:1px dashed var(--line);}
  .gap-col .gap-text{font-size:12.5px;color:var(--ink-soft);}
  .talking-point{margin-top:14px;padding:14px 16px;border-radius:12px;background:var(--gray-chip-soft);border:1px dashed var(--gray-chip);}
  .talking-point .tp-label{display:flex;align-items:center;gap:6px;font-size:11.5px;font-family:var(--font-mono);color:var(--gray-chip-ink);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;}
  .talking-point .tp-label .internal-tag{background:var(--ink);color:#fff;padding:1px 6px;border-radius:5px;font-size:10px;letter-spacing:0;}
  .talking-point p{font-size:13px;color:var(--ink-soft);}
  .improve-list{margin-top:26px;}
  .section-title{font-size:12px;font-family:var(--font-mono);text-transform:uppercase;letter-spacing:0.08em;color:var(--ink-faint);margin-bottom:10px;}
  .improve-card{padding:18px 20px;margin-bottom:14px;}
  .improve-head{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;margin-bottom:12px;}
  .improve-head .left{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .rank-badge{width:26px;height:26px;border-radius:50%;background:var(--ink);color:#fff;font-family:var(--font-mono);font-size:13px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .tag-row{display:flex;gap:8px;flex-wrap:wrap;}
  .mini-tag{font-size:11.5px;padding:3px 9px;border-radius:999px;background:var(--gray-chip-soft);color:var(--gray-chip-ink);}
  .mini-tag.gmv-high{background:var(--red-soft);color:var(--red-ink);}
  .mini-tag.gmv-mid{background:var(--amber-soft);color:var(--amber-ink);}
  .plan-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;}
  .plan-box{border:1px solid var(--line);border-radius:12px;padding:14px 16px;}
  .plan-box .plan-label{font-size:11.5px;font-family:var(--font-mono);color:var(--ink-faint);margin-bottom:6px;}
  .plan-box p{font-size:13px;color:var(--ink-soft);}
  .report-footer{margin-top:30px;padding-top:20px;border-top:1px solid var(--line);}
  .footer-note{font-size:12.5px;color:var(--ink-faint);}
  @media (max-width:820px){.compare-grid{grid-template-columns:1fr;}}
  @media (max-width:720px){.app{padding-left:16px;padding-right:16px;}.plan-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="wordmark"><span class="mark">Flayr</span><span class="tag">// benchmark vs creator</span></div>
  </div>

  <div class="report-top">
    <div>
      <div class="report-title-row">
        <h2 style="font-size:20px;" id="report-title">提升报告</h2>
        <span class="badge" id="report-level-badge"></span>
      </div>
      <div class="report-meta" id="report-meta">产品：- · 市场：-</div>
      <div class="degraded-inline" id="report-degraded-inline" style="display:none;">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 9v4M12 17h.01M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/></svg>
        <span id="degraded-text">分析存在降级信息</span>
      </div>
    </div>
  </div>

  <div id="report-done-content">
    <div class="card summary-card">
      <div class="verdict" id="summary-verdict"></div>
      <p id="summary-detail"></p>
      <div class="gate-row" id="summary-gates"></div>
    </div>

    <div class="stage-tabs" id="stage-tabs"></div>
    <div id="stage-panels"></div>

    <div class="improve-list">
      <div class="section-title" style="margin-top:8px;">TOP 3 提升点 · 按 GMV 影响排序</div>
      <div id="improvement-cards"></div>
    </div>

    <div class="report-footer">
      <span class="footer-note">阶段命名与判定逻辑以 structure_library_full.md / QA-RULES 为准。</span>
    </div>
  </div>
</div>

<script>
(function(){
  var report = {{bd_report_data}};
  function $(id){ return document.getElementById(id); }
  function text(value){ return value == null ? '' : String(value); }
  function el(tag, className, value){
    var node = document.createElement(tag);
    if (className) node.className = className;
    if (value != null) node.textContent = text(value);
    return node;
  }
  function append(parent, tag, className, value){
    var node = el(tag, className, value);
    parent.appendChild(node);
    return node;
  }
  function severityClass(stage){ return stage.severityClass || 'sev-small'; }
  function severityLabel(stage){ return stage.severityLabel || '未分析'; }
  function renderStageTabs(){
    var tabs = $('stage-tabs');
    var panels = $('stage-panels');
    (report.stages || []).forEach(function(stage, index){
      var tab = el('button', 'stage-tab' + (index === 0 ? ' active' : ''));
      tab.type = 'button';
      append(tab, 'span', 'sev-dot', '');
      tab.querySelector('.sev-dot').style.background = stage.dotColor || 'var(--gray-chip)';
      tab.appendChild(document.createTextNode(stage.code + ' ' + stage.name));
      var panelId = 'panel-' + stage.code;
      tab.addEventListener('click', function(){
        document.querySelectorAll('.stage-tab').forEach(function(item){ item.classList.remove('active'); });
        document.querySelectorAll('.stage-panel').forEach(function(item){ item.classList.remove('active'); });
        tab.classList.add('active');
        $(panelId).classList.add('active');
      });
      tabs.appendChild(tab);

      var panel = el('div', 'stage-panel' + (index === 0 ? ' active' : ''));
      panel.id = panelId;
      var head = append(panel, 'div', 'stage-panel-head');
      append(head, 'h3', '', stage.code + ' · ' + stage.name);
      append(head, 'span', 'sev-chip ' + severityClass(stage), '差距等级：' + severityLabel(stage));
      var grid = append(panel, 'div', 'compare-grid');
      renderSide(grid, 'creator', '达人表现', stage.creator);
      var gap = append(grid, 'div', 'gap-col');
      append(gap, 'span', 'sev-chip ' + severityClass(stage), severityLabel(stage) + '差距');
      append(gap, 'div', 'gap-text', stage.gap);
      renderSide(grid, 'benchmark', '标杆表现', stage.benchmark);
      var talking = append(panel, 'div', 'talking-point');
      var label = append(talking, 'div', 'tp-label');
      append(label, 'span', 'internal-tag', '内部');
      label.appendChild(document.createTextNode('跟达人怎么说'));
      append(talking, 'p', '', stage.talkingPoint);
      panels.appendChild(panel);
    });
  }
  function renderSide(grid, role, title, side){
    var column = append(grid, 'div', 'compare-col ' + role);
    append(column, 'div', 'who', title);
    var thumb = append(column, 'div', 'frame-thumb');
    append(thumb, 'span', 'ts', side.ts || '待确认');
    append(column, 'div', 'evidence-text', side.text || '暂无明确证据。');
  }
  function renderGates(){
    var gates = $('summary-gates');
    (report.gates || []).forEach(function(gate){
      var chip = el('div', 'gate-chip' + (gate.level === 'P0' ? '' : ' p2'));
      append(chip, 'span', 'p-tag', gate.level);
      chip.appendChild(document.createTextNode(gate.text));
      gates.appendChild(chip);
    });
  }
  function renderImprovements(){
    var container = $('improvement-cards');
    (report.improvements || []).forEach(function(item){
      var card = append(container, 'div', 'card improve-card');
      var head = append(card, 'div', 'improve-head');
      var left = append(head, 'div', 'left');
      append(left, 'span', 'rank-badge', item.rank);
      append(left, 'span', '', item.title);
      var tags = append(head, 'div', 'tag-row');
      append(tags, 'span', 'mini-tag ' + (item.gmvClass || ''), 'GMV 影响：' + item.gmvImpact);
      append(tags, 'span', 'mini-tag', '差距类型：' + item.gapType);
      var planGrid = append(card, 'div', 'plan-grid');
      renderPlan(planGrid, '方案 A · AI 生成图 / 拍摄指令', item.planA);
      renderPlan(planGrid, '方案 B · 标杆对应镜头', item.planB);
    });
    if (!(report.improvements || []).length){
      var empty = append(container, 'div', 'card improve-card');
      append(empty, 'p', '', '本次没有可展示的提升点，请结合阶段证据和沟通素材继续核对。');
    }
  }
  function renderPlan(parent, label, value){
    var box = append(parent, 'div', 'plan-box');
    append(box, 'div', 'plan-label', label);
    append(box, 'p', '', value || '暂无明确方案。');
  }

  $('report-title').textContent = report.title || '提升报告';
  $('report-meta').textContent = '产品：' + (report.product || '未填写') + ' · 市场：' + (report.market || '未指定市场') + (report.generatedAt ? ' · ' + report.generatedAt : '');
  var badge = $('report-level-badge');
  badge.textContent = report.strategyLevel ? '策略增强分析' : '视频证据分析';
  badge.className = 'badge ' + (report.strategyLevel ? 'badge-level-strategy' : 'badge-level-basic');
  if (report.degraded){
    $('report-degraded-inline').style.display = 'flex';
    $('degraded-text').textContent = report.degradedReason || '分析存在降级信息';
  }
  $('summary-verdict').textContent = report.summary.verdict || '本次报告暂无一句话结论。';
  $('summary-detail').textContent = report.summary.detail || '请结合下方阶段证据、差距和沟通素材查看。';
  renderGates();
  renderStageTabs();
  renderImprovements();
})();
</script>
</body>
</html>
